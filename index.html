<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Master</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

/* Screens */
.screen{
  display:none;
  padding:20px;
}
.active{display:block}

/* Title */
h1,h2{
  text-align:center;
}

/* Button */
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#00ffd5;
  color:black;
  font-weight:bold;
}

/* Level grid */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.level{
  background:#1a2233;
  padding:15px;
  border-radius:10px;
}

/* HUD */
.hud{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* Game */
#box{
  position:absolute;
  border-radius:12px;
  display:none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>Tap Master</h1>
  <button onclick="goLevels()">Play</button>
</div>

<!-- LEVELS -->
<div id="levels" class="screen">
  <h2>Select Level</h2>
  <div class="grid" id="grid"></div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="hud">
    <div>Lvl: <span id="lvl"></span></div>
    <div>Score: <span id="score"></span></div>
    <div>Goal: <span id="goal"></span></div>
  </div>
  <div id="box"></div>
</div>

<script>
let level=1, score=0, goal=5;
let speed=800, size=100;
let timer, running=false;

/* screens */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* levels */
let grid=document.getElementById("grid");
for(let i=1;i<=50;i++){
  let d=document.createElement("div");
  d.className="level";
  d.innerText=i;
  d.onclick=()=>start(i);
  grid.appendChild(d);
}

function goLevels(){ show("levels"); }

/* start */
function start(lvl){
  level=lvl;
  score=0;

  // 🔥 difficulty logic
  goal=5 + lvl;
  speed=900 - lvl*12;
  if(speed<200) speed=200;

  size=120 - lvl;
  if(size<40) size=40;

  show("game");
  running=true;

  updateUI();

  let box=document.getElementById("box");
  box.style.display="block";

  move();
  timer=setInterval(move,speed);
}

function move(){
  if(!running) return;

  let box=document.getElementById("box");

  box.style.width=size+"px";
  box.style.height=size+"px";

  box.style.left=Math.random()*(window.innerWidth-size)+"px";
  box.style.top=Math.random()*(window.innerHeight-size)+"px";

  box.style.background="hsl("+Math.random()*360+",100%,50%)";
}

/* click */
document.getElementById("box").onclick=function(e){
  if(!running) return;

  score++;
  updateUI();

  if(score>=goal){
    win();
  }

  move();
  e.stopPropagation();
};

/* miss */
document.body.onclick=function(e){
  if(running && e.target.id!="box"){
    score--;
    if(score<0) score=0;
    updateUI();
  }
};

function updateUI(){
  document.getElementById("lvl").innerText=level;
  document.getElementById("score").innerText=score;
  document.getElementById("goal").innerText=goal;
}

function win(){
  running=false;
  clearInterval(timer);
  alert("Level "+level+" Complete!");
  show("levels");
}
</script>

</body>
</html>
