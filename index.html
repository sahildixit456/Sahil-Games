<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Neon Tap Challenge</title>

<style>
:root {
  --bg1:#0f172a;
  --bg2:#020617;
  --accent:#00ffd5;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui, Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  overflow:hidden;
}

/* Top HUD */
.hud{
  position:fixed;
  top:0;
  width:100%;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  font-size:14px;
  z-index:10;
}

.hud span{color:var(--accent)}

/* Center Start */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

button{
  padding:14px 28px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00ffd5,#00bfff);
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* Game Area */
#box{
  position:absolute;
  display:none;
  border-radius:16px;
  box-shadow:0 0 25px #00ffd5;
  transition: transform 0.1s;
}

#box:active{
  transform:scale(0.9);
}

/* Progress bar */
.bar{
  position:fixed;
  bottom:0;
  width:100%;
  height:6px;
  background:#111;
}
.fill{
  height:100%;
  width:100%;
  background:var(--accent);
}
</style>
</head>

<body>

<div class="hud">
  <div>🎯 <span id="score">0</span></div>
  <div>🔥 <span id="combo">0</span></div>
  <div>⏱ <span id="time">15</span></div>
</div>

<div class="center" id="menu">
  <h1>⚡ Neon Tap</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="box"></div>

<div class="bar"><div class="fill" id="bar"></div></div>

<script>
let score=0, combo=0, time=15, speed=900;
let timer, mover, lastClick=0, running=false;

function startGame(){
  score=0; combo=0; time=15; speed=900;
  running=true;

  document.getElementById("menu").style.display="none";
  document.getElementById("box").style.display="block";

  updateUI();
  moveBox();
  mover=setInterval(moveBox, speed);
  timer=setInterval(tick,1000);
}

function tick(){
  time--;
  updateUI();
  document.getElementById("bar").style.width=(time/15)*100+"%";

  if(time<=0){
    clearInterval(timer);
    clearInterval(mover);
    endGame();
  }
}

function moveBox(){
  if(!running) return;

  let box=document.getElementById("box");

  let size=Math.random()*80+80;
  box.style.width=size+"px";
  box.style.height=size+"px";

  let x=Math.random()*(window.innerWidth-size);
  let y=Math.random()*(window.innerHeight-size);

  box.style.left=x+"px";
  box.style.top=y+"px";

  box.style.background="hsl("+Math.random()*360+",100%,50%)";
}

document.getElementById("box").onclick=function(e){
  if(!running) return;

  let now=Date.now();
  let diff=now-lastClick;
  lastClick=now;

  if(diff<350){
    combo++;
    score+=2+combo;
  }else{
    combo=0;
    score++;
  }

  speed*=0.96;
  clearInterval(mover);
  mover=setInterval(moveBox,speed);

  updateUI();
  moveBox();
  e.stopPropagation();
};

document.body.onclick=function(e){
  if(running && e.target.id!=="box"){
    score-=2;
    combo=0;
    updateUI();
  }
};

function updateUI(){
  score=Math.max(0,score);
  document.getElementById("score").innerText=score;
  document.getElementById("combo").innerText=combo;
  document.getElementById("time").innerText=time;
}

function endGame(){
  running=false;
  document.getElementById("box").style.display="none";
  document.getElementById("menu").style.display="block";
  alert("Score: "+score);
}
</script>

</body>
</html>
