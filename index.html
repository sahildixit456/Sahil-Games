<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Level Game</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
}

/* Screens */
.screen{
  display:none;
  padding:20px;
}
.active{
  display:block;
}

/* Buttons */
button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00ffd5;
  color:black;
  font-weight:bold;
}

/* Level grid */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.level{
  padding:15px;
  background:#111;
  border-radius:10px;
  cursor:pointer;
}

/* Game box */
#box{
  position:absolute;
  display:none;
  border-radius:12px;
  box-shadow:0 0 20px #00ffd5;
}

/* HUD */
.hud{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.5);
  padding:10px;
  display:flex;
  justify-content:space-around;
}
</style>

</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>🎮 Tap Game</h1>
  <button onclick="showLevels()">Play</button>
</div>

<!-- LEVEL SELECT -->
<div id="levels" class="screen">
  <h2>Select Level</h2>
  <div class="grid" id="levelGrid"></div>
  <button onclick="showMenu()">Back</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="hud">
    <div>Lvl: <span id="lvl">1</span></div>
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">10</span></div>
  </div>
  <div id="box"></div>
</div>

<script>
let currentLevel=1;
let score=0;
let time=10;
let speed=800;
let timer,mover;
let running=false;

/* Screens */
function showMenu(){
  setScreen("menu");
}
function showLevels(){
  setScreen("levels");
}
function startLevel(lvl){
  currentLevel=lvl;
  setScreen("game");
  startGame();
}

function setScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* Create levels */
let grid=document.getElementById("levelGrid");
for(let i=1;i<=50;i++){
  let div=document.createElement("div");
  div.className="level";
  div.innerText=i;
  div.onclick=()=>startLevel(i);
  grid.appendChild(div);
}

/* Game logic */
function startGame(){
  score=0;
  time=10;

  // difficulty increase 🔥
  speed=900 - (currentLevel*10);
  if(speed<200) speed=200;

  running=true;

  document.getElementById("lvl").innerText=currentLevel;
  updateUI();

  let box=document.getElementById("box");
  box.style.display="block";

  moveBox();
  mover=setInterval(moveBox,speed);

  timer=setInterval(()=>{
    time--;
    updateUI();
    if(time<=0){
      clearInterval(timer);
      clearInterval(mover);
      endGame();
    }
  },1000);
}

function moveBox(){
  if(!running) return;

  let box=document.getElementById("box");

  let size=120 - currentLevel; // smaller each level
  if(size<40) size=40;

  box.style.width=size+"px";
  box.style.height=size+"px";

  box.style.left=Math.random()*(window.innerWidth-size)+"px";
  box.style.top=Math.random()*(window.innerHeight-size)+"px";

  box.style.background="hsl("+Math.random()*360+",100%,50%)";
}

document.getElementById("box").onclick=function(e){
  if(!running) return;

  score++;
  updateUI();
  moveBox();
  e.stopPropagation();
};

document.body.onclick=function(e){
  if(running && e.target.id!=="box"){
    score--;
    updateUI();
  }
};

function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("time").innerText=time;
}

function endGame(){
  running=false;
  document.getElementById("box").style.display="none";

  if(score>=currentLevel){ 
    alert("✅ Level Passed!");
    startLevel(currentLevel+1);
  } else {
    alert("❌ Try Again");
    showLevels();
  }
}
</script>

</body>
</html>
