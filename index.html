<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Mobile Game Pro</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: Arial;
    overflow: hidden;
}

/* Top UI */
.ui {
    position: fixed;
    top: 0;
    width: 100%;
    text-align: center;
    padding: 10px;
    z-index: 10;
}

h2 { margin: 5px; }

/* Game area full */
#gameArea {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* 🔥 BIG CENTERED BOX */
#box {
    position: absolute;
    display: none;
    border-radius: 15px;
    box-shadow: 0 0 25px #00ffcc;
}
</style>

</head>

<body>

<div class="ui">
    <h2>🎮 MOBILE GAME</h2>
    <p>Score: <span id="score">0</span></p>
</div>

<div id="gameArea">
    <div id="box"></div>
</div>

<script>
let score = 0;
let gameRunning = true;

let box = document.getElementById("box");

function moveBox(){
    let size = Math.random()*120 + 120; // 🔥 MUCH BIGGER
    box.style.width = size+"px";
    box.style.height = size+"px";

    let x = Math.random()*(window.innerWidth - size);
    let y = Math.random()*(window.innerHeight - size);

    box.style.left = x+"px";
    box.style.top = y+"px";

    box.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
}

box.style.display = "block";
moveBox();

/* Click */
box.onclick = function(e){
    score++;
    document.getElementById("score").innerText = score;
    moveBox();
    e.stopPropagation();
};

/* Miss */
document.body.onclick = function(e){
    if(e.target.id !== "box"){
        score--;
        document.getElementById("score").innerText = score;
    }
};
</script>

</body>
</html>
